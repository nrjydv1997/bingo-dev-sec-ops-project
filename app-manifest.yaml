---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bingo-deployment
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: bingo
    spec:
      containers:
        - name: bingo-container
          image: nrjydv1997/bingo-dev-sec-ops-project:latest
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: bingo-service
spec:
  type: LoadBalancer
  selector:
    app: bingo
  ports:
    - port: 80
      targetPort: 3000
